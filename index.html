<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle TodoList</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 标签页导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="tasks">
                <i class="fas fa-tasks"></i> 任务
            </button>
            <button class="tab-btn" data-tab="history">
                <i class="fas fa-history"></i> 历史
            </button>
        </div>

        <!-- 任务标签页 -->
        <div id="tasks-tab" class="tab-content active">
            <!-- 头部 -->
            <header class="header">
                <h1><i class="fas fa-tasks"></i> Kindle TodoList</h1>
                <div class="current-date">
                    今天：<span id="todayDate"></span>
                </div>
            </header>

            <!-- 任务统计（一行显示） -->
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-icon"><i class="fas fa-list"></i></span>
                    <span class="stat-number" id="totalTasks">0</span>
                    <span class="stat-label">总任务</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon"><i class="fas fa-clock"></i></span>
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span class="stat-label">待完成</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon"><i class="fas fa-check-circle"></i></span>
                    <span class="stat-number" id="completedTasks">0</span>
                    <span class="stat-label">已完成</span>
                </div>
            </div>

            <!-- 添加新任务区域 -->
            <div class="add-task">
                <div class="form-group">
                    <label for="taskInput"><i class="fas fa-pencil-alt"></i> 任务内容</label>
                    <input type="text" id="taskInput" placeholder="请输入待办事项...">
                </div>
                
                <div class="form-group">
                    <label for="taskDate"><i class="fas fa-calendar"></i> 任务日期</label>
                    <div class="date-input-wrapper">
                        <input type="text" id="taskDate" class="date-input" 
                               placeholder="格式：YYYY-MM-DD" 
                               maxlength="10">
                        <div class="date-hint">格式：YYYY-MM-DD</div>
                    </div>
                </div>
                
                <button id="addBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 添加任务
                </button>
            </div>

            <!-- 任务列表 -->
            <div class="task-list-container">
                <div class="section-header">
                    <h3><i class="fas fa-list-ul"></i> 任务列表</h3>
                    <div class="filter">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="pending">待完成</button>
                        <button class="filter-btn" data-filter="completed">已完成</button>
                    </div>
                </div>
                <ul id="taskList"></ul>
            </div>
        </div>

        <!-- 历史记录标签页 -->
        <div id="history-tab" class="tab-content">
            <div class="history-header">
                <h2><i class="fas fa-history"></i> 历史记录</h2>
                <div class="history-controls">
                    <div class="form-group">
                        <label for="historyDate"><i class="fas fa-calendar-alt"></i> 筛选日期</label>
                        <input type="text" id="historyDate" class="date-input" 
                               placeholder="格式：YYYY-MM-DD" 
                               maxlength="10">
                    </div>
                    <div class="history-buttons">
                        <button id="filterHistoryBtn" class="btn btn-secondary">
                            <i class="fas fa-filter"></i> 筛选
                        </button>
                        <button id="clearHistoryBtn" class="btn btn-danger">
                            <i class="fas fa-trash"></i> 清空历史
                        </button>
                    </div>
                </div>
            </div>
            <div id="historyList"></div>
        </div>

        <!-- 操作指南 -->
        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
            <ul>
                <li><strong>日期格式：</strong>必须为 YYYY-MM-DD（如 2026-05-04）</li>
                <li><strong>添加任务：</strong>填写内容和日期后点击"添加任务"</li>
                <li><strong>完成任务：</strong>点击任务前的复选框</li>
                <li><strong>删除任务：</strong>点击任务后的垃圾桶图标</li>
                <li><strong>数据保存：</strong>所有数据自动保存到本地</li>
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
